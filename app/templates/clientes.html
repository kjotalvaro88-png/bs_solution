<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>BS-Solution - Registrar Cliente</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Arial, sans-serif; background: #f0f0f0; }
        .navbar {
            background: #1a1a2e;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .navbar h1 { color: #e94560; }
        .navbar a {
            color: #e94560;
            text-decoration: none;
            margin-left: 20px;
        }
        .contenido { padding: 40px; }
        h2 { color: #1a1a2e; margin-bottom: 25px; }
        .card {
            background: white;
            padding: 35px;
            border-radius: 12px;
            max-width: 600px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h3 { color: #e94560; margin: 20px 0 15px; }
        h3:first-child { margin-top: 0; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-size: 14px;
        }
        button {
            width: 100%;
            padding: 12px;
            background: #e94560;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #c73652; }
        .exito {
            background: #e0ffe0;
            color: #27ae60;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
        .error {
            background: #ffe0e0;
            color: #c0392b;
            padding: 10px;
            border-radius: 8px;
            margin-bottom: 20px;
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="navbar">
        <h1>BS-Solution</h1>
        <div>
            <a href="/dashboard">Panel</a>
            <a href="/logout">Cerrar sesión</a>
        </div>
    </div>
    <div class="contenido">
        <h2>Registrar Cliente</h2>
        <div class="card">
            {% if mensaje %}
            <div class="exito">{{ mensaje }}</div>
            {% endif %}
            {% if error %}
            <div class="error">{{ error }}</div>
            {% endif %}
            <form method="POST">
                <h3>Datos Personales</h3>
                <input type="text" name="nombre" placeholder="Nombre completo" required>
                <input type="text" name="cedula" placeholder="Cédula" required>
                <input type="text" name="telefono" placeholder="Teléfono">
                <input type="email" name="correo" placeholder="Correo electrónico">
                <h3>Acceso al Sistema</h3>
                <input type="text" name="usuario_cliente" placeholder="Usuario para iniciar sesión" required>
                <input type="password" name="contrasena_cliente" placeholder="Contraseña" required>
                <button type="submit">Registrar Cliente</button>
            </form>
        </div>
    </div>
</body>
</html>
